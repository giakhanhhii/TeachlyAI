<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teachly</title>
  <link rel="stylesheet" href="css/auth-ui.css" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Nunito', var(--font-sans), sans-serif;
  }

  body,
  html {
    height: 100%;
    margin: 0;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  .forest-page {
    min-height: 100vh;
    width: 100%;
    background: linear-gradient(160deg, #c8e6c9 0%, #a5d6a7 20%, #81c784 40%, #b2dfdb 70%, #e0f2f1 100%);
    padding: 0 0 64px 0;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .forest-page::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(180deg, transparent, rgba(27, 94, 32, 0.13));
    pointer-events: none;
  }

  .hero-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-top: 26px;
    position: relative;
    z-index: 2;
  }

  .main-hub-topbar {
    position: absolute;
    top: 20px;
    right: 28px;
    z-index: 3;
    display: flex;
    justify-content: flex-end;
    padding: 0;
  }

  .main-hub-auth-anchor {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    min-height: 44px;
  }

  .headline-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
    padding-top: 0;
    width: 100%;
  }

  .headline-area h1 {
    font-size: 56px;
    font-weight: 800;
    color: #1b5e20;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 0;
    text-shadow: 0 2px 8px rgba(255, 255, 255, 0.3);
  }

  .headline-area p {
    font-size: 22px;
    color: #33691e;
    font-weight: 600;
  }

  .cards-row {
    display: flex;
    gap: 32px;
    justify-content: center;
    padding: 42px 48px 60px;
    flex-wrap: wrap;
    align-items: stretch;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 0;
    width: 280px;
    flex: 0 1 280px;
    box-shadow: 0 10px 30px rgba(27, 94, 32, 0.12);
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 40px rgba(27, 94, 32, 0.18);
  }

  .card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    border-radius: 24px 24px 0 0;
  }

  .card-body {
    padding: 20px 20px 14px 20px;
    display: flex;
    flex: 1 1 auto;
    flex-direction: column;
  }

  .card-title {
    font-size: 20px;
    font-weight: 800;
    color: #1b5e20;
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 14.5px;
    color: #558b2f;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: auto;
    align-self: flex-start;
    border-radius: 999px;
    padding: 3px 11px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }

  .badge-recommend {
    background: #e8f5e9;
    color: #2e7d32;
    border: 1.5px solid #a5d6a7;
  }

  .badge-new {
    background: #f1f8e9;
    color: #558b2f;
    border: 1.5px solid #c5e1a5;
  }

  .badge-spacer {
    visibility: hidden;
    pointer-events: none;
  }

  /* Decorative trees */
  .trees-bg {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 120px;
    pointer-events: none;
    z-index: 0;
  }

  .cards-row,
  .hero-area {
    position: relative;
    z-index: 1;
  }

  @media (max-width: 768px) {
    .hero-area {
      margin-top: 68px;
      padding: 0 16px;
    }

    .headline-area h1 {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .headline-area p {
      font-size: 25px;
      line-height: 1.35;
    }

    .cards-row {
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 24px 16px 40px;
    }

    .main-hub-topbar {
      top: 16px;
      right: 16px;
    }

    .card {
      width: min(100%, 440px);
      flex: 0 1 100%;
      border-radius: 22px;
    }

    .card-img {
      height: 184px;
      border-radius: 22px 22px 0 0;
    }

    .card-body {
      padding: 22px 20px 0;
    }

    .card-title {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 17px;
      line-height: 1.65;
    }

    .badge {
      margin-top: 12px;
      padding: 5px 13px;
      font-size: 12px;
    }
  }

  /* ── Auto Mode toggle (main_hub standalone) ── */
  .auto-mode-toggle {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255, 255, 255, 0.55);
    border: 1.5px solid rgba(46, 125, 50, 0.25);
    border-radius: 999px;
    padding: 7px 18px 7px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: #558b2f;
    margin-bottom: 0;
    transform: none;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    backdrop-filter: blur(4px);
  }
  .auto-mode-toggle:hover {
    background: rgba(255, 255, 255, 0.75);
    border-color: rgba(46, 125, 50, 0.45);
  }
  .auto-mode-toggle[aria-pressed="true"] {
    background: rgba(25, 118, 210, 0.12);
    border-color: #1976d2;
    color: #1565c0;
  }
  .toggle-track {
    position: relative;
    width: 36px;
    height: 20px;
    background: #b0bec5;
    border-radius: 999px;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .auto-mode-toggle[aria-pressed="true"] .toggle-track {
    background: #1976d2;
  }
  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  .auto-mode-toggle[aria-pressed="true"] .toggle-thumb {
    transform: translateX(16px);
  }

  @media (max-width: 520px) {
    .headline-area h1 {
      font-size: 40px;
    }

    .headline-area p {
      font-size: 22px;
    }

    .cards-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: stretch;
      padding-left: 14px;
      padding-right: 14px;
    }

    .card {
      width: 100%;
      min-width: 0;
      flex: none;
      border-radius: 18px;
      padding-bottom: 0;
      display: flex;
      flex-direction: column;
    }

    .card-img {
      height: 116px;
      border-radius: 18px 18px 0 0;
    }

    .card-body {
      padding: 16px 14px 10px;
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
    }

    .card-title {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .badge {
      margin-top: auto;
      align-self: flex-start;
      padding: 4px 10px;
      font-size: 10px;
      letter-spacing: 0.02em;
    }
  }
</style>
</head>
<body>

<div class="forest-page">
  <img class="trees-bg" src="svg/trees-bg.svg" alt="" />
  <div class="main-hub-topbar">
    <div class="main-hub-auth-anchor" id="mainHubAuthControls" hidden></div>
  </div>

  <div class="hero-area">
    <!-- Headline -->
    <div class="headline-area">
      <button id="autoModeToggle" class="auto-mode-toggle" aria-pressed="false" title="Bật/tắt chế độ Teachly tự tạo">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">Tạo Custom</span>
      </button>
      <h1>Teachly</h1>
      <p>Bạn muốn bắt đầu như thế nào?</p>
    </div>
  </div>

  <!-- Cards -->
  <div class="cards-row">
    <!-- Card 1: Tạo Full Set -->
    <a class="card" href="chatbot_ui.html?flow=fullset">
      <img class="card-img" src="svg/card-fullset.svg" alt="Full Set" />
      <div class="card-body">
        <div class="card-title">Tạo Full Set</div>
        <div class="card-desc">Tạo bộ 3 slide, quiz, flashcard</div>
        <div class="badge badge-recommend">
          <svg width="11" height="11" viewBox="0 0 12 12">
            <polygon points="6,1 7.5,4.5 11,4.8 8.5,7.2 9.2,11 6,9 2.8,11 3.5,7.2 1,4.8 4.5,4.5" fill="#2e7d32" />
          </svg>
          KHUYẾN KHÍCH
        </div>
      </div>
    </a>

    <!-- Card 2: Tạo slide — bộ slide trong khung rừng -->
    <a class="card" href="chatbot_ui.html?flow=slide">
      <img class="card-img" src="svg/card-slide.svg" alt="Slide" />
      <div class="card-body">
        <div class="card-title">Tạo slide</div>
        <div class="card-desc">Tạo slide theo nội dung của bạn</div>
        <div class="badge badge-new badge-spacer" aria-hidden="true">MỚI</div>
      </div>
    </a>

    <!-- Card 3: Tạo quiz — phiếu trắc nghiệm trong rừng -->
    <a class="card" href="chatbot_ui.html?flow=quiz">
      <img class="card-img" src="svg/card-quiz.svg" alt="Quiz" />
      <div class="card-body">
        <div class="card-title">Tạo quiz</div>
        <div class="card-desc">Tạo quiz cho nội dung thi THPTQG tiếng anh</div>
        <div class="badge badge-new">MỚI</div>
      </div>
    </a>

    <!-- Card 4: Tạo flashcard -->
    <a class="card" href="chatbot_ui.html?flow=flashcard">
      <img class="card-img" src="svg/card-flashcard.svg" alt="Flashcard" />
      <div class="card-body">
        <div class="card-title">Tạo flashcard</div>
        <div class="card-desc">Tạo flashcard từ vựng và phát âm chuẩn cho bài giảng của bạn</div>
      </div>
    </a>
  </div>
</div>
<script>
  (function () {
    var LS_KEY = "teachly_auto_mode_v1";
    var btn = document.getElementById("autoModeToggle");
    var labelEl = btn && btn.querySelector(".toggle-label");

    function getEnabled() {
      try {
        var raw = localStorage.getItem(LS_KEY);
        if (!raw) return false;
        var parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return false;
        if (typeof parsed.enabled === "boolean") return parsed.enabled;
        if (parsed.neverAskChoice === "auto") return true;
        if (parsed.neverAskChoice === "custom") return false;
        return false;
      } catch (_) { return false; }
    }

    function setEnabled(val) {
      try {
        var raw = localStorage.getItem(LS_KEY);
        var state = {};
        try { state = JSON.parse(raw) || {}; } catch (_) {}
        state.enabled = val;
        state.neverAskChoice = val ? "auto" : "custom";
        localStorage.setItem(LS_KEY, JSON.stringify(state));
      } catch (_) {}
    }

    function updateUI(enabled) {
      if (!btn) return;
      btn.setAttribute("aria-pressed", enabled ? "true" : "false");
      if (labelEl) labelEl.textContent = enabled ? "Tạo Auto" : "Tạo Custom";
    }

    updateUI(getEnabled());

    if (btn) {
      btn.addEventListener("click", function () {
        var next = !getEnabled();
        setEnabled(next);
        updateUI(next);
      });
    }
  })();
</script>
<script type="module">
  import { initMainHubPage } from "./js/chatbot/mainHub.js";
  initMainHubPage();
</script>
</body>
</html>
