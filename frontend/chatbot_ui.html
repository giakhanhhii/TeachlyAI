<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Để trống = dùng cùng origin (khuyến nghị khi chạy uvicorn). Ví dụ chỉ backend khác cổng: content="http://127.0.0.1:8000" -->
  <meta name="teachly-api-base" content="" />
  <title>Teachly AI</title>
  <link rel="stylesheet" href="css/chatbot-tokens.css" />
  <link rel="stylesheet" href="css/chatbot-layout.css" />
  <link rel="stylesheet" href="css/chatbot-sidebar.css" />
  <link rel="stylesheet" href="css/chatbot-chat.css" />
  <link rel="stylesheet" href="css/chatbot-experience.css" />
  <link rel="stylesheet" href="css/chatbot-flow-cards.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-group">
          <div class="brand">Teachly AI</div>
          <div class="sub">Trợ lý AI Giáo dục</div>
        </div>
        <button class="toggle-btn" id="toggleSidebar" title="Thu gọn/Mở rộng">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <button class="new-chat" id="newChatBtn" title="Đoạn chat mới">
        <span class="full-text">+ Đoạn chat mới</span>
        <span class="icon-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </span>
      </button>

      <div class="chat-list-title">Đoạn chat</div>
      <div class="chat-list" id="chatList"></div>
      <div class="muted" id="threadLabel" style="margin-top: auto; padding-bottom: 8px;"></div>
    </aside>
    <main class="main">
      <div class="top">
        <span class="top-brand">Teachly AI</span>
        <span class="top-title">Đoạn hội thoại</span>
        <button type="button" class="top-home-btn" id="topHomeBtn" title="Về trang chọn Teachly">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 10.5L10 4l7 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M5 8.5V16h4v-4h2v4h4V8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Trang chủ
        </button>
      </div>
      <div class="chat-phase" id="chatPhase">
        <div id="messages">
          <div class="messages-inner" id="messagesInner"></div>
        </div>
        <div class="composer-wrap">
          <form class="composer" id="form">
            <div class="composer-main">
              <input id="input" placeholder="Hỏi tôi bất cứ điều gì về dạy học..." autocomplete="off" />
            </div>
            <div class="composer-footer">
              <div class="footer-left">
                <button type="button" class="add-btn" title="Thêm tệp">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                </button>
              </div>
              <div class="footer-right">
                <div class="model-picker">
                  <span>Sonnet 4.6</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </div>
                <button id="send" type="submit">Gửi</button>
              </div>
            </div>
          </form>
          <div class="disclaimer">Teachly AI có thể mắc sai sót, vui lòng kiểm tra kỹ trước khi gửi</div>
        </div>
      </div>
      <div id="experienceLayer" aria-hidden="true">
        <div class="experience-toolbar">
          <button type="button" class="back-chat-btn" id="backToChatBtn">Quay lại chat</button>
        </div>
        <div class="experience-body" id="experienceBody"></div>
      </div>
    </main>
  </div>
  <script type="module" src="js/chatbot/main.js"></script>
</body>

</html>
