<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Để trống = gọi API cùng origin (đúng khi mở http://127.0.0.1:8000/chatbot_ui.html qua uvicorn). -->
  <!-- Nếu mở UI bằng Live Server / cổng khác: bật dòng dưới để dịch flashcard (OpenAI) gọi vào backend FastAPI. -->
  <meta name="teachly-api-base" content="" />
  <!-- <meta name="teachly-api-base" content="http://127.0.0.1:8000" /> -->
  <title>Teachly AI</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/chatbot-tokens.css" />
  <link rel="stylesheet" href="css/chatbot-layout.css" />
  <link rel="stylesheet" href="css/chatbot-sidebar.css" />
  <link rel="stylesheet" href="css/chatbot-chat.css" />
  <link rel="stylesheet" href="css/chatbot-experience.css" />
  <link rel="stylesheet" href="css/chatbot-flow-cards.css" />
  <link rel="stylesheet" href="css/chatbot-startup-hub.css" />
  <link rel="stylesheet" href="css/recommendation-panel.css" />
  <link rel="stylesheet" href="css/auth-ui.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-group">
          <div class="brand">Teachly AI</div>
          <div class="sub">Trợ lý AI Giáo dục</div>
        </div>
        <button class="toggle-btn" id="toggleSidebar" title="Thu gọn/Mở rộng">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <button class="new-chat" id="newChatBtn" title="Đoạn chat mới">
        <span class="full-text">+ Đoạn chat mới</span>
        <span class="icon-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </span>
      </button>

      <div class="chat-list-title">Đoạn chat</div>
      <div class="chat-list" id="chatList"></div>
      <div class="sidebar-footer">
        <div class="muted sidebar-thread-label" id="threadLabel"></div>
        <div class="sidebar-user-shell" id="sidebarUserShell">
          <div class="sidebar-user-card">
            <div class="sidebar-user-main">
              <div class="sidebar-user-avatar" id="sidebarUserAvatar" aria-hidden="true">K</div>
              <div class="sidebar-user-copy">
                <div class="sidebar-user-name" id="sidebarUserName">Khách</div>
                <div class="sidebar-user-subtitle" id="sidebarUserSubtitle">Đăng nhập để mở bài giảng</div>
              </div>
            </div>
            <button
              type="button"
              class="sidebar-user-settings"
              id="sidebarSettingsBtn"
              title="Cài đặt"
              aria-label="Cài đặt"
              aria-expanded="false"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8.92 4.6H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.39.34.9.53 1.42.53H21a2 2 0 1 1 0 4h-.18c-.52 0-1.03.19-1.42.47z"></path>
              </svg>
            </button>
          </div>
          <div class="sidebar-settings-menu" id="sidebarSettingsMenu" hidden>
            <div class="sidebar-settings-row">
              <div class="sidebar-settings-copy">
                <div class="sidebar-settings-title">Recommendation system</div>
                <div class="sidebar-settings-note">Bật để hiện menu REC</div>
              </div>
              <label class="sidebar-switch" for="recommendPanelToggle">
                <input type="checkbox" id="recommendPanelToggle" />
                <span class="sidebar-switch-slider" aria-hidden="true"></span>
              </label>
            </div>
            <button type="button" class="sidebar-danger-btn" id="clearUnpinnedChatsBtn">
              Xóa tất cả đoạn chat
            </button>
            <button type="button" class="sidebar-secondary-btn" id="sidebarLogoutBtn" hidden>
              Đăng xuất
            </button>
          </div>
        </div>
      </div>
    </aside>
    <main class="main">
      <div class="top">
        <span class="top-brand">Teachly AI</span>
        <span class="top-title">Đoạn hội thoại</span>
        <div class="top-actions">
          <div class="top-auth-controls" id="topAuthControls" hidden></div>
          <button type="button" class="top-home-btn" id="topHomeBtn" title="Về trang chọn Teachly">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M3 10.5L10 4l7 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M5 8.5V16h4v-4h2v4h4V8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            Trang chủ
          </button>
        </div>
      </div>
      <div class="chat-phase" id="chatPhase">
        <div id="messages">
          <div class="messages-inner" id="messagesInner"></div>
          <script>
            (() => {
              const flow = new URLSearchParams(location.search).get("flow");
              const normalized = flow === "flash" || flow === "image" ? "flashcard" : flow;
              const actionsByFlow = {
                fullset: [["Tải lên file", "fullset_pdf"], ["Nhập chủ đề trực tiếp", "fullset_topic"]],
                slide: [["Tải lên file", "slide_pdf"], ["Nhập chủ đề trực tiếp", "slide_topic"]],
                quiz: [["Tải lên file", "quiz_pdf"], ["Nhập chủ đề trực tiếp", "quiz_topic"], ["Làm full đề THPTQG", "quiz_fulltest"]],
                flashcard: [["Tải lên file", "flash_pdf"], ["Nhập từ vựng trực tiếp", "flash_vocab"], ["Nhập chủ đề trực tiếp", "flash_topic"]],
              };
              const actions = actionsByFlow[normalized];
              const root = document.getElementById("messagesInner");
              if (!root || !actions) return;
              const row = document.createElement("div");
              row.className = "msg-row bot";
              const avatar = document.createElement("div");
              avatar.className = "bot-avatar";
              avatar.setAttribute("aria-hidden", "true");
              avatar.textContent = "T";
              const bubble = document.createElement("div");
              bubble.className = "bubble bot";
              const text = document.createElement("div");
              text.style.whiteSpace = "pre-wrap";
              text.textContent = "Chào bạn! Bạn đã có tài liệu sẵn chưa hay muốn tôi tự biên soạn theo chủ đề?";
              const actionWrap = document.createElement("div");
              actionWrap.className = "msg-actions";
              actions.forEach(([label, value]) => {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = "msg-action-btn";
                btn.dataset.flowValue = value;
                btn.dataset.keepEnabled = "1";
                btn.textContent = label;
                actionWrap.appendChild(btn);
              });
              bubble.appendChild(text);
              bubble.appendChild(actionWrap);
              row.appendChild(avatar);
              row.appendChild(bubble);
              root.appendChild(row);
            })();
          </script>
        </div>
        <div class="composer-wrap">
          <form class="composer" id="form">
            <div class="composer-main">
              <input id="input" placeholder="Hỏi tôi bất cứ điều gì về dạy học..." autocomplete="off" />
            </div>
            <div class="composer-footer">
              <div class="footer-left">
                <button type="button" class="add-btn" id="addFileBtn" title="Thêm tệp">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                </button>
              </div>
              <div class="footer-right">
                <div class="model-picker">
                  <span>Sonnet 4.6</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </div>
                <button id="send" type="submit">Gửi</button>
              </div>
            </div>
          </form>
          <div class="disclaimer">Teachly AI có thể mắc sai sót, vui lòng kiểm tra kỹ trước khi gửi</div>
        </div>
      </div>
      <div id="experienceLayer" aria-hidden="true">
        <div class="experience-toolbar">
          <button type="button" class="back-chat-btn" id="backToChatBtn">Quay lại chat</button>
        </div>
        <div class="experience-body" id="experienceBody"></div>
      </div>
    </main>
  </div>
  <script type="module" src="js/chatbot/main.js"></script>
</body>

</html>
